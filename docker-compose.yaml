services:
  db:
    image: postgres:15.3
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    container_name: nest-teslo-db
    volumes:
      - ./postgres:/var/lib/postgresql/data